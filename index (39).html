<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Info</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
    }

    .image-wrapper {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;

      opacity: 0;
      animation: fadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-delay: 0.15s;
    }

    .image-wrapper img {
      width: 100%;
      max-width: 480px;
      height: auto;
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="image-wrapper">
    <img src="info.png" alt="info" />
  </div>
</body>
</html>
